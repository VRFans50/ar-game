<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Sort - Final Stable</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; overflow: hidden; touch-action: none; }
        
        /* UI СЛОИ */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #000 0%, #1a2a6c 100%); display: flex; justify-content: center; align-items: center; z-index: 100; transition: background 0.5s; }
        .menu-container { text-align: center; background: rgba(0,0,0,0.85); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); width: 300px; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-play { background: #4facfe; color: white; }
        .btn-settings { background: rgba(255,255,255,0.1); color: white; }

        /* ИГРОВОЙ ЭКРАН */
        #game-ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 24px; z-index: 50; display: none; text-shadow: 0 2px 4px #000; }
        #pause-btn { position: absolute; top: 20px; right: 20px; width: 45px; height: 45px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 50%; color: white; z-index: 51; display: none; cursor: pointer; }
        #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: auto; }
        
        /* ФИКС КАМЕРЫ ДЛЯ ЯНДЕКСА */
        video { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; z-index: -1 !important; }
        .a-canvas { display: none !important; }
        .arjs-loader { display: none !important; }
        .hidden { display: none !important; }

        .map-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .map-btn { padding: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .map-btn.active { border-color: #4facfe; background: rgba(79, 172, 254, 0.2); }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="main-menu" class="menu-container">
            <h2 style="font-size:14px; color:#aaa; letter-spacing: 2px;">РЕКОРД</h2>
            <div id="best-score" style="font-size: 50px; color: #4facfe; margin-bottom: 20px;">0</div>
            <button class="btn btn-play" onclick="startGame()">Играть</button>
            <button class="btn btn-settings" onclick="openSettings('main-menu')">Настройки</button>
        </div>

        <div id="settings-menu" class="menu-container hidden">
            <h3>ВЫБОР МИРА</h3>
            <div class="map-selector">
                <button class="map-btn active" onclick="setMap('classic', this)">Классика</button>
                <button class="map-btn" onclick="setMap('midnight', this)">Полночь</button>
                <button class="map-btn" onclick="setMap('coal', this)">Уголь</button>
                <button class="map-btn" style="background:#ff4f8b" onclick="initAR(this)">AR РЕЖИМ 📷</button>
            </div>
            <button class="btn btn-settings" id="settings-back">Назад</button>
        </div>

        <div id="pause-menu" class="menu-container hidden">
            <h2>ПАУЗА</h2>
            <button class="btn btn-play" onclick="resumeGame()">Продолжить</button>
            <button class="btn btn-settings" onclick="openSettings('pause-menu')">Настройки</button>
            <button class="btn btn-settings" onclick="location.reload()">В меню</button>
        </div>
    </div>

    <div id="game-container" style="position: absolute; width: 100%; height: 100%;">
        <div id="game-ui">Счет: <span id="current-score">0</span></div>
        <button id="pause-btn" onclick="pauseGame()">||</button>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('current-score');
const bestScoreElement = document.getElementById('best-score');

let width, height, score = 0, highScore = localStorage.getItem('gs_best_final') || 0;
let shapes = [], particles = [], stars = [], gravity = { x: 0, y: 0.5 };
let gameActive = false, isPaused = false, currentMap = 'classic';
let spawnInterval, touchStart = null;

bestScoreElement.innerText = highScore;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Инициализация AR
function initAR(btn) {
    if (!document.querySelector('a-scene')) {
        const scene = document.createElement('a-scene');
        scene.setAttribute('embedded', '');
        scene.setAttribute('arjs', 'sourceType: webcam; debugUIEnabled: false; trackingMethod: best;');
        scene.setAttribute('vr-mode-ui', 'enabled: false');
        
        const cam = document.createElement('a-entity');
        cam.setAttribute('camera', '');
        scene.appendChild(cam);
        document.body.prepend(scene);

        // Ждем инициализации камеры и фиксим размер
        scene.addEventListener('camera-init', () => {
            const video = document.querySelector('video');
            if (video) {
                video.style.width = "100vw";
                video.style.height = "100vh";
            }
        });
    }
    setMap('ar', btn);
}

function setMap(mapId, btn) {
    currentMap = mapId;
    const uiLayer = document.getElementById('ui-layer');
    const container = document.getElementById('game-container');
    const scene = document.querySelector('a-scene');

    if (scene) scene.style.display = (mapId === 'ar') ? 'block' : 'none';
    
    // Сброс фонов
    container.style.background = (mapId === 'ar') ? 'transparent' : '#1a1a1a';
    uiLayer.style.background = (mapId === 'ar') ? 'transparent' : 'linear-gradient(180deg, #000 0%, #1a2a6c 100%)';

    if (mapId === 'midnight') {
        container.style.background = '#000428';
        stars = [];
        for(let i=0; i<80; i++) stars.push({x: Math.random()*width, y: Math.random()*height, s: Math.random()*2, o: Math.random(), v: 0.01});
    } else if (mapId === 'coal') {
        container.style.background = 'url("https://t3.ftcdn.net/jpg/08/97/50/50/360_F_897505055_RC6AC1VHZNyLBQMuMDSrdHZR9tW0zabi.jpg") center/cover';
    }

    if (btn) {
        document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
}

function startGame() {
    document.getElementById('ui-layer').classList.add('hidden');
    document.getElementById('game-ui').style.display = 'block';
    document.getElementById('pause-btn').style.display = 'block';
    gameActive = true; isPaused = false; score = 0; shapes = []; 
    startSpawner();
}

function startSpawner() {
    clearInterval(spawnInterval);
    spawnInterval = setInterval(() => { if(!isPaused) shapes.push(new Shape()); }, 1500);
}

function pauseGame() {
    isPaused = true;
    document.getElementById('ui-layer').classList.remove('hidden');
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('pause-menu').classList.remove('hidden');
    document.getElementById('settings-menu').classList.add('hidden');
}

function resumeGame() {
    isPaused = false;
    document.getElementById('ui-layer').classList.add('hidden');
}

function openSettings(from) {
    document.getElementById(from).classList.add('hidden');
    document.getElementById('settings-menu').classList.remove('hidden');
    document.getElementById('settings-back').onclick = () => {
        document.getElementById('settings-menu').classList.add('hidden');
        document.getElementById(from).classList.remove('hidden');
    };
}

// УПРАВЛЕНИЕ СВАЙПАМИ + СТРЕЛКА
window.addEventListener('touchstart', e => touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY});
window.addEventListener('touchend', e => {
    if (!touchStart || isPaused) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
        if (Math.abs(dx) > Math.abs(dy)) gravity = {x: dx > 0 ? 0.6 : -0.6, y: 0};
        else gravity = {x: 0, y: dy > 0 ? 0.6 : -0.6};
    }
});

class Shape {
    constructor() {
        this.x = Math.random()*(width-40)+20; this.y = 50;
        this.color = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33'][Math.floor(Math.random()*4)];
        this.vx = 0; this.vy = 0;
    }
    update() {
        this.vx += gravity.x; this.vy += gravity.y;
        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.98; this.vy *= 0.98;
        if(this.x<20 || this.x>width-20) { this.vx *= -0.6; this.x = this.x<20?20:width-20; }
        if(this.y<20 || this.y>height-20) { this.vy *= -0.6; this.y = this.y<20?20:height-20; }
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.roundRect(this.x-15, this.y-15, 30, 30, 8); ctx.fill();
    }
}

function animate() {
    ctx.clearRect(0, 0, width, height);

    if (currentMap === 'midnight') {
        ctx.fillStyle = 'white';
        stars.forEach(s => {
            s.o += s.v; if(s.o>1 || s.o<0.2) s.v*=-1;
            ctx.globalAlpha = Math.max(0, s.o);
            ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1;
    }

    if (gameActive && !isPaused) {
        // Стрелка гравитации
        ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 4; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(width/2, height/2); 
        ctx.lineTo(width/2 + gravity.x*150, height/2 + gravity.y*150); ctx.stroke();

        shapes.forEach((s, i) => {
            s.update(); s.draw();
            for(let j=i+1; j<shapes.length; j++) {
                let dx = shapes[j].x - s.x, dy = shapes[j].y - s.y, d = Math.hypot(dx, dy);
                if(d < 30) {
                    if(s.color === shapes[j].color) {
                        shapes.splice(j, 1); shapes.splice(i, 1);
                        score += 10; scoreElement.innerText = score;
                        if(score > highScore) { highScore = score; localStorage.setItem('gs_best_final', score); bestScoreElement.innerText = score; }
                    } else {
                        let nx = dx/d, ny = dy/d, v = s.vx*nx + s.vy*ny;
                        s.vx -= v*nx; s.vy -= v*ny; shapes[j].vx += v*nx; shapes[j].vy += v*ny;
                    }
                }
            }
        });
    }
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
