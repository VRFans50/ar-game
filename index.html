<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Sort - AR GitHub Version</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background: #000; overflow: hidden; touch-action: none;
        }

        /* UI слои */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #000000 0%, #1a2a6c 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; transition: background 0.5s;
        }

        .menu-container {
            text-align: center; background: rgba(0, 0, 0, 0.85);
            padding: 30px; border-radius: 20px; backdrop-filter: blur(15px);
            width: 320px; color: white; border: 1px solid rgba(255,255,255,0.1);
        }

        .btn {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            border: none; border-radius: 10px; font-size: 1em;
            cursor: pointer; transition: 0.2s; text-transform: uppercase; font-weight: bold;
        }
        .btn-play { background: #4facfe; color: white; }
        .btn-settings { background: rgba(255, 255, 255, 0.1); color: white; }

        #game-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; overflow: hidden;
        }
        
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 20; }
        
        #game-ui {
            position: absolute; top: 20px; left: 20px; color: white;
            font-size: 24px; pointer-events: none; z-index: 50; display: none;
            text-shadow: 0 2px 4px rgba(0,0,0,1);
        }

        #pause-btn {
            position: absolute; top: 20px; right: 20px; width: 45px; height: 45px;
            background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 50%;
            color: white; cursor: pointer; z-index: 51; display: none;
        }

        .map-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .map-btn {
            padding: 8px; font-size: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 5px; cursor: pointer;
        }
        .map-btn.active { border-color: #4facfe; background: rgba(79, 172, 254, 0.2); }
        .btn-ar { background: #ff4f8b !important; color: white; }

        .hidden { display: none !important; }

        /* Контейнер для видео камеры */
        #ar-holder {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; display: none;
        }
        
        /* Скрываем мусор от библиотек */
        .arjs-loader, .a-enter-vr, .a-enter-ar { display: none !important; }
    </style>
</head>
<body>

    <div id="ar-holder"></div>

    <div id="ui-layer">
        <div id="main-menu" class="menu-container">
            <h2 style="font-weight:300; color:#aaa; font-size:14px;">РЕКОРД</h2>
            <div id="best-score" style="font-size: 2.5em; color: #4facfe; margin-bottom: 20px;">0</div>
            <button class="btn btn-play" onclick="startGame()">Играть</button>
            <button class="btn btn-settings" onclick="showSettings('main-menu')">Настройки</button>
        </div>

        <div id="settings-menu" class="menu-container hidden">
            <h2>КАРТА</h2>
            <div class="map-selector">
                <button class="map-btn active" onclick="setMap('classic', this)">Обычная</button>
                <button class="map-btn" onclick="setMap('midnight', this)">Полночь</button>
                <button class="map-btn" onclick="setMap('coal', this)">Уголь</button>
                <button class="map-btn btn-ar" onclick="requestAR(this)">AR РЕЖИМ 📷</button>
            </div>
            <button class="btn btn-settings" id="back-from-settings">Назад</button>
        </div>
        
        <div id="pause-menu" class="menu-container hidden">
            <h2>ПАУЗА</h2>
            <button class="btn btn-play" onclick="resumeGame()">Продолжить</button>
            <button class="btn btn-settings" onclick="location.reload()">В меню</button>
        </div>
    </div>

    <div id="game-container">
        <div id="game-ui">Счет: <span id="current-score">0</span></div>
        <button id="pause-btn" onclick="pauseGame()">||</button>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const uiLayer = document.getElementById('ui-layer');
const arHolder = document.getElementById('ar-holder');
const gameContainer = document.getElementById('game-container');

let width, height, score = 0, highScore = 0;
let shapes = [], stars = [];
let gravity = { x: 0, y: 0.5 };
let gameActive = false, isPaused = false;
let spawnInterval, currentMap = 'classic';

const COLORS = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33'];

// Главная функция для GitHub: запрос камеры и запуск AR
async function requestAR(btn) {
    try {
        // 1. Прямой запрос к браузеру на использование камеры
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        // Останавливаем временный поток, AR.js создаст свой
        stream.getTracks().forEach(track => track.stop());

        // 2. Инициализация AR сцены
        arHolder.innerHTML = `
            <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
                <a-entity camera></a-entity>
            </a-scene>
        `;
        arHolder.style.display = 'block';
        
        // 3. Переключаем карту
        setMap('ar', btn);
    } catch (err) {
        alert("Пожалуйста, разрешите доступ к камере в настройках браузера для AR.");
        console.error("Camera error:", err);
    }
}

function initStars() {
    stars = [];
    for(let i = 0; i < 80; i++) {
        stars.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            size: Math.random() * 2,
            opacity: Math.random(),
            v: (Math.random() * 0.01) + 0.005
        });
    }
}

function setMap(mapId, btn) {
    currentMap = mapId;
    
    // Выключаем AR если выбран другой режим
    if (mapId !== 'ar') {
        arHolder.style.display = 'none';
        arHolder.innerHTML = '';
    }

    uiLayer.style.background = (mapId === 'ar') ? 'transparent' : 'linear-gradient(180deg, #000000 0%, #1a2a6c 100%)';
    gameContainer.style.background = (mapId === 'ar') ? 'transparent' : (mapId === 'midnight' ? '#000428' : '#1a1a1a');

    if (mapId === 'midnight') initStars();
    else stars = []; // Звезд в AR больше нет
    
    document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function startGame() {
    uiLayer.classList.add('hidden');
    document.getElementById('game-ui').style.display = 'block';
    document.getElementById('pause-btn').style.display = 'block';
    score = 0; shapes = []; gameActive = true;
    startSpawner();
}

function pauseGame() {
    isPaused = true; clearInterval(spawnInterval);
    uiLayer.classList.remove('hidden');
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('pause-menu').classList.remove('hidden');
}

function resumeGame() {
    isPaused = false; uiLayer.classList.add('hidden');
    document.getElementById('pause-menu').classList.add('hidden');
    startSpawner();
}

function showSettings(from) {
    document.getElementById(from).classList.add('hidden');
    document.getElementById('settings-menu').classList.remove('hidden');
    document.getElementById('back-from-settings').onclick = () => {
        document.getElementById('settings-menu').classList.add('hidden');
        document.getElementById(from).classList.remove('hidden');
    };
}

function startSpawner() {
    if (spawnInterval) clearInterval(spawnInterval);
    spawnInterval = setInterval(() => { if(gameActive && !isPaused) spawnShape(); }, 1500);
}

class Shape {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vx = 0; this.vy = 0;
    }
    update() {
        if (isPaused) return;
        this.vx += gravity.x; this.vy += gravity.y;
        this.x += this.vx; this.y += this.vy;
        if (this.x < 15 || this.x > width - 15) this.vx *= -0.7;
        if (this.y < 15 || this.y > height - 15) this.vy *= -0.7;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.roundRect(this.x-15, this.y-15, 30, 30, 5); ctx.fill();
    }
}

function spawnShape() {
    shapes.push(new Shape(Math.random()*(width-40)+20, 50, COLORS[Math.floor(Math.random()*4)]));
}

window.addEventListener('touchstart', e => {
    const touch = e.touches[0];
    const x = touch.clientX, y = touch.clientY;
    if (x < width/3) gravity = {x: -0.5, y: 0};
    else if (x > width*2/3) gravity = {x: 0.5, y: 0};
    else if (y < height/3) gravity = {x: 0, y: -0.5};
    else gravity = {x: 0, y: 0.5};
});

function animate() {
    ctx.clearRect(0, 0, width, height);
    if (currentMap === 'midnight') {
        ctx.fillStyle = 'white';
        stars.forEach(s => {
            s.opacity += s.v;
            if (s.opacity >= 1 || s.opacity <= 0.1) s.v *= -1;
            ctx.globalAlpha = Math.max(0, s.opacity);
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1;
    }
    if (gameActive && !isPaused) {
        shapes.forEach(s => { s.update(); s.draw(); });
    }
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
